# Phase 1 on the clean/day train split.
#
# Load from the clean/day ConvFuser baseline checkpoint, not the official
# full-train BEVFusion checkpoint, for strict clean-to-adverse experiments.

samples_per_gpu: 4
workers_per_gpu: 4
max_epochs: 4
gt_paste_stop_epoch: -1

model:
  type: BEVFusion

  fuser:
    type: UQFuser
    in_channels: [80, 256]
    out_channels: 256
    fusion_strategy: gate
    reliability:
      hidden_ch: 256
      init_bias: -4.0

  uq_training:
    enable: true
    loss_weight: 1.0
    label_smoothing: 0.0
    loss_cam_weight: 2.0
    loss_lid_weight: 1.0
    cam_support_keep_frac: 0.5

  freeze:
    - "encoders."
    - "decoder."
    - "heads."
    - "fuser.base_fuser."

  loss_scale:
    object: 0.0
    map: 0.0

optimizer:
  type: AdamW
  lr: 3.0e-4
  weight_decay: 1.0e-4

optimizer_config:
  grad_clip:
    max_norm: 10.0
    norm_type: 2

lr_config:
  policy: CosineAnnealing
  warmup: linear
  warmup_iters: 500
  warmup_ratio: 0.01
  min_lr_ratio: 1.0e-3

checkpoint_config:
  interval: 1

evaluation:
  interval: 999

data:
  train:
    dataset:
      ann_file: ${dataset_root + "nuscenes_infos_train_clear_day.pkl"}
  val:
    ann_file: ${dataset_root + "nuscenes_infos_val.pkl"}
  test:
    ann_file: ${dataset_root + "nuscenes_infos_val.pkl"}
