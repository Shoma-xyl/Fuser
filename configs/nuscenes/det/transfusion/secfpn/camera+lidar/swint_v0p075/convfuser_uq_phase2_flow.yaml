# ============================================================================
# Phase 2 (UQ-conditioned Flow Matching Fuser).
#
# Pilot command:
#   CUDA_VISIBLE_DEVICES=0,1,2,3 torchrun --nproc_per_node=4 tools/train.py \
#     configs/nuscenes/det/transfusion/secfpn/camera+lidar/swint_v0p075/convfuser_uq_phase2_flow.yaml \
#     --run-dir runs/uq_phase2_flow \
#     --load_from runs/uq_phase1_v2/latest.pth
#
# This is the Stage-1 true Flow Matching version:
#   L_total = L_det + lambda_fm * L_fm
#   no gate, no UOT, no extra identity loss.
# ============================================================================

samples_per_gpu: 2
workers_per_gpu: 4
max_epochs: 10

find_unused_parameters: true

model:
  type: BEVFusion

  fuser:
    type: UQFlowFuser
    in_channels: [80, 256]
    out_channels: 256
    reliability:
      hidden_ch: 256
      init_bias: -4.0
    cond_hidden_ch: 256
    flow:
      latent_ch: 256
      cond_ch: 256
      hidden_ch: 256
      time_dim: 128
      num_blocks: 6
      groups: 8
      max_velocity: 1.0

  flow_training:
    enable: true
    enable_fm: true
    apply_corruption: true
    loss_weight: 0.10
    fm_loss_type: smooth_l1
    smooth_l1_beta: 0.1
    clean_prob: 0.70
    cam_prob: 0.20
    num_steps: 1

  freeze:
    - "encoders."
    - "fuser.reliability_head."
    - "fuser.teacher_proj."

  loss_scale:
    object: 1.0
    map: 1.0

optimizer:
  type: AdamW
  lr: 5.0e-5
  weight_decay: 0.01
  paramwise_cfg:
    custom_keys:
      fuser.velocity_net:
        lr_mult: 3.0
      fuser.cond_proj:
        lr_mult: 2.0
      fuser.source_proj:
        lr_mult: 0.5

optimizer_config:
  grad_clip:
    max_norm: 35.0
    norm_type: 2

lr_config:
  policy: CosineAnnealing
  warmup: linear
  warmup_iters: 2000
  warmup_ratio: 0.01
  min_lr_ratio: 1.0e-3

checkpoint_config:
  interval: 1

evaluation:
  interval: 1

data:
  train:
    dataset:
      ann_file: ${dataset_root + "nuscenes_infos_train_clear_day.pkl"}
  val:
    ann_file: ${dataset_root + "nuscenes_infos_val.pkl"}
  test:
    ann_file: ${dataset_root + "nuscenes_infos_val.pkl"}
